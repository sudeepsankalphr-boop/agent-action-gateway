name: budget-policy
version: "1.0.0"
rules:
  - id: reject-extreme-budget
    condition:
      action_type: set_budget
      param: amount
      op: gt
      value: 50000
    decision: REJECTED
    reason: "Budget amount exceeds hard rejection limit of $50,000"

  - id: review-high-budget
    condition:
      action_type: set_budget
      param: amount
      op: gt
      value: 10000
    decision: NEEDS_APPROVAL
    reason: "Budget amount exceeds review threshold of $10,000; human approval required"
