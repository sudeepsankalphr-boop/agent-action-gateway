name: permissions-policy
version: "1.1.0"
rules:
  - id: reject-destructive-sql
    condition:
      action_type: execute_query
      param_contains_word:
        param: sql
        words: [DROP, TRUNCATE, ALTER]
    decision: REJECTED
    reason: "SQL contains a schema-destructive keyword (DROP/TRUNCATE/ALTER); execution is not permitted"

  - id: review-delete-sql
    condition:
      action_type: execute_query
      param_contains_word:
        param: sql
        words: [DELETE]
    decision: NEEDS_APPROVAL
    reason: "SQL contains DELETE; human approval required before execution"

  - id: review-destructive-action
    condition:
      action_type_in:
        - delete_campaign
        - delete_account
        - bulk_delete
    decision: NEEDS_APPROVAL
    reason: "Destructive operations require human approval before execution"

  - id: reject-unknown-action
    condition:
      action_type_not_in:
        - send_email
        - set_budget
        - create_campaign
        - update_campaign
        - delete_campaign
        - delete_account
        - bulk_delete
        - execute_query
    decision: REJECTED
    reason: "Action type is not in the list of permitted operations"
