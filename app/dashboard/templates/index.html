<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Agent Action Gateway — Audit Dashboard</title>
  <style>
    body { font-family: sans-serif; margin: 2rem; background: #f9fafb; color: #111; }
    h1 { font-size: 1.4rem; margin-bottom: 1.2rem; }
    table { border-collapse: collapse; width: 100%; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    th { background: #1e293b; color: #fff; text-align: left; padding: .6rem .8rem; font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; }
    td { padding: .55rem .8rem; border-bottom: 1px solid #e2e8f0; font-size: .85rem; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f1f5f9; }
    .badge { display: inline-block; padding: .2rem .55rem; border-radius: 9999px; font-size: .75rem; font-weight: 600; }
    .APPROVED      { background: #dcfce7; color: #166534; }
    .NEEDS_APPROVAL { background: #fef9c3; color: #854d0e; }
    .REJECTED      { background: #fee2e2; color: #991b1b; }
    .mono { font-family: monospace; font-size: .78rem; color: #475569; }
    .empty { text-align: center; color: #94a3b8; padding: 2rem; }
  </style>
</head>
<body>
  <h1>Audit Dashboard</h1>
  <table>
    <thead>
      <tr>
        <th>Timestamp</th>
        <th>Agent ID</th>
        <th>Action Type</th>
        <th>Decision</th>
        <th>Reason</th>
        <th>Correlation ID</th>
      </tr>
    </thead>
    <tbody>
      {% if records %}
        {% for r in records %}
        <tr>
          <td class="mono">{{ r.timestamp }}</td>
          <td>{{ r.agent_id }}</td>
          <td>{{ r.action_type }}</td>
          <td><span class="badge {{ r.decision }}">{{ r.decision }}</span></td>
          <td>{{ r.reason or "—" }}</td>
          <td class="mono">{{ r.correlation_id }}</td>
        </tr>
        {% endfor %}
      {% else %}
        <tr><td colspan="6" class="empty">No audit records yet.</td></tr>
      {% endif %}
    </tbody>
  </table>
</body>
</html>
